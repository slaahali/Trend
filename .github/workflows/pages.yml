name: Deploy to GitHub Pages

# Publishes the static site in web/ to GitHub Pages.
# Works once the repository is PUBLIC (GitHub Free) — or on a paid plan while private.
# Trigger automatically on push to the default branch, or manually from the Actions tab.

on:
  push:
    branches: [claude/blissful-mccarthy-hm5tv0]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site (web/ as the root)
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
